version: '3.8'

services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_db
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/tfm-ucm-ciberseguridad-2026/orquestador-backend:latest
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: tfm_backend
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - PORT=8080
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

  frontend:
    image: ghcr.io/tfm-ucm-ciberseguridad-2026/orquestador-frontend:latest
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: tfm_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  neo4j_data:
  neo4j_logs:
